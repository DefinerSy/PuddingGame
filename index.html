<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>布丁叠叠乐 · Pudding Stack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <header class="hud">
        <h1 class="game-title">布丁叠叠乐</h1>
        <div class="hud-row stats-row">
          <div class="stat-pill stat-coins">
            <span class="stat-emoji" aria-hidden="true">🪙</span>
            <div class="stat-text">
              <span class="stat-label">费用</span>
              <span id="money" class="stat-value">0</span>
            </div>
          </div>
          <div class="stat-pill stat-wave">
            <span class="stat-emoji" aria-hidden="true">🌊</span>
            <div class="stat-text">
              <span class="stat-label">波次</span>
              <span id="wave" class="stat-value">0</span>
            </div>
          </div>
          <div class="stat-pill stat-base">
            <span class="stat-emoji" aria-hidden="true">🏠</span>
            <div class="stat-text">
              <span class="stat-label">基地</span>
              <span id="base-hp" class="stat-value">100</span>
            </div>
          </div>
        </div>
        <div class="hud-row shop shop-panel">
          <div class="shop-actions">
            <button type="button" id="btn-roll" class="btn btn-roll">
              <span class="btn-emoji" aria-hidden="true">🎰</span>
              <span class="btn-label">老虎机</span>
            </button>
            <span id="roll-cost" class="cost-tag"></span>
          </div>
          <div id="slots" class="slots"></div>
        </div>
        <p class="hint hint-desktop">
          A/D 或 ←/→ 移动吊机 · 空格抓取/释放 · <strong>R</strong> 老虎机 Roll ·
          <strong>1 / 2 / 3</strong> 从左到右取出 · 仅绿色区域可着地，红区落地会销毁
        </p>
        <p class="hint hint-touch">
          拖动画布左右移动吊机，或使用下方方向键 · 点「抓取」拾取/放下 ·
          绿区可着地，红区落地会销毁
        </p>
      </header>
      <div id="fx-overlay" class="fx-overlay" aria-hidden="true"></div>
      <div class="game-stage">
        <div class="game-wrap">
          <canvas id="game" width="1200" height="640"></canvas>
        </div>
        <div id="game-over-veil" class="game-over-veil" hidden>
          <div class="game-over-card">
            <p class="game-over-title">基地被攻破</p>
            <p class="game-over-hint">刷新页面重新开始</p>
          </div>
        </div>
      </div>
      <div class="mobile-controls" aria-label="触屏操作">
        <button
          type="button"
          id="btn-left"
          class="touch-btn"
          aria-label="吊机向左"
        >
          ◀
        </button>
        <button type="button" id="btn-grab" class="touch-btn touch-btn-grab">
          抓取
        </button>
        <button
          type="button"
          id="btn-right"
          class="touch-btn"
          aria-label="吊机向右"
        >
          ▶
        </button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
